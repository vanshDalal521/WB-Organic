# Render deployment config for the WB Organic Dairy NestJS API.
# Connect this repo in Render, and it will provision the DB + web service.
# After the first deploy, the preDeployCommand creates the schema and seeds
# the admin user (admin@wborganicdairy.com / admin123).

databases:
  - name: wb-postgres
    plan: free
    databaseName: wb_organic_dairy
    user: wb

services:
  - type: web
    name: wb-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm run build:api
    startCommand: node apps/api/dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wb-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      # Comma-separated list of allowed frontend origins (your Vercel URL).
      # Include https://<your-app>.vercel.app and https://*.vercel.app for previews.
      - key: ALLOWED_ORIGINS
        value: https://your-app.vercel.app,https://*.vercel.app
    # NOTE: free tier does not support preDeployCommand.
    # After the first deploy, open the wb-api service Shell and run:
    #   npx prisma db push --skip-generate
    #   npm run db:seed
